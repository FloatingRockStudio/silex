name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build_sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: publish-sdist
          path: dist/*.tar.gz

  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-13
          - macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-*
          CIBW_SKIP: "*-musllinux_*"
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: publish-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    needs:
      - build_sdist
      - build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: publish-sdist
          path: dist

      - name: Download Windows wheels
        uses: actions/download-artifact@v4
        with:
          name: publish-wheels-windows-latest
          path: dist

      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: publish-wheels-ubuntu-latest
          path: dist

      - name: Download macOS x64 wheels
        uses: actions/download-artifact@v4
        with:
          name: publish-wheels-macos-13
          path: dist

      - name: Download macOS arm64 wheels
        uses: actions/download-artifact@v4
        with:
          name: publish-wheels-macos-14
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
